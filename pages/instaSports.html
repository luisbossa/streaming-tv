<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InstaTV Sports</title>

    <link rel='stylesheet' href='/assets/css/instaSports/global.css' />
    <link rel='stylesheet' href='/assets/css/instaSports/header.css' />
    <link rel='stylesheet' href='/assets/css/instaSports/hero.css' />
    <link rel='stylesheet' href='/assets/css/instaSports/screen.css' />
    <link rel='stylesheet' href='/assets/css/instaSports/carrusel.css' />
    <link rel='stylesheet' href='/assets/css/instaSports/right-side.css' />

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <header class="app-header" id="appHeader">
        <div class="app-header__container">

            <a href="/" class="app-header__brand">
                <img src="/assets/images/logo.png" alt="InstaTV Sports">

                <div class="app-header__brand-text">
                    <h1>InstaTV Sports</h1>
                    <span>Streaming deportivo</span>
                </div>
            </a>


            <nav class="app-header__nav" id="mainNav">

                <span class="app-header__link--live">
                    <span class="live-dot"></span>
                    EN VIVO
                </span>

                <a href="/" class="app-header__link active">
                    InstaTV
                </a>

                <a href="/pages/radio.html" class="app-header__link">
                    SonoLive
                </a>

            </nav>


            <button class="app-header__toggle" id="menuToggle" aria-label="Abrir menú">
                <span></span>
                <span></span>
                <span></span>
            </button>

        </div>
    </header>

    <div class='main-wrapper'>
        <div class="hero">
            <div id='player-col'>
                <div id='player-shell'>
                    <div id='player-screen'>
                        <p class='idle-txt'>Selecciona un canal para ver en vivo</p>
                    </div>

                    <div id='ch-bar'>
                        <div>
                            <div class='ch-name' id='ch-name'>Selecciona un canal</div>
                        </div>

                        <div style='position:relative;display:inline-block'>
                            <button id='share-btn' title='Compartir'>
                                <svg fill='currentColor' height='13' viewBox='0 0 24 24' width='13'>
                                    <path
                                        d='M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z'>
                                    </path>
                                </svg>
                                Compartir
                            </button>

                            <div id='share-menu'>
                                <a href='#' id='sh-wa' target='_blank'>
                                    <svg fill='currentColor' height='16' viewBox='0 0 24 24' width='16'>
                                        <path
                                            d='M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z'>
                                        </path>
                                        <path
                                            d='M12 0C5.373 0 0 5.373 0 12c0 2.126.555 4.123 1.526 5.855L0 24l6.335-1.506A11.933 11.933 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.79 9.79 0 0 1-5.002-1.375l-.36-.213-3.76.894.942-3.653-.233-.375A9.794 9.794 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z'>
                                        </path>
                                    </svg>
                                    WhatsApp
                                </a>
                                <a href='#' id='sh-fb' target='_blank'>
                                    <svg fill='currentColor' height='16' viewBox='0 0 24 24' width='16'>
                                        <path
                                            d='M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z'>
                                        </path>
                                    </svg>
                                    Facebook
                                </a>
                                <a href='#' id='sh-cp'
                                    onclick='navigator.clipboard.writeText(location.href);this.style.color="var(--red)";setTimeout(function(){document.getElementById("sh-cp").style.color="#aaa";},1500);return false'>
                                    <svg fill='currentColor' height='16' viewBox='0 0 24 24' width='16'>
                                        <path
                                            d='M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z'>
                                        </path>
                                    </svg>
                                    Copiar enlace
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class='sources-bar' id='sources-bar'>
                        <div id='src-btns'></div>
                    </div>
                </div>

                <div id="ch-rail" class="channel-rail">

                    <div class="channel-rail-header">

                        <div class="channel-rail-title">
                            <span>Categorías</span>
                        </div>

                        <div class="rail-filters">
                            <button class="rf on" data-cat="deportes">Deportes</button>
                            <button class="rf" data-cat="all">Todos</button>
                            <button class="rf" data-cat="futbol">Fútbol</button>
                            <button class="rf" data-cat="noticias">Noticias</button>
                            <button class="rf" data-cat="entretenimiento">Entretenimiento</button>
                        </div>

                    </div>

                    <div id="ch-strip" class="channel-rail-list"></div>

                </div>

                <div id="post-view" class="channel-preview">
                    <div id="post-view-inner"></div>
                </div>
            </div>

            <div class="sports-sidebar">
                <div class="sports-card" id="today-panel">
                    <div class="sports-card-title">
                        <span>
                            <span id="today-lbl">Partidos de HOY</span>
                        </span>

                        <span class="match-controls">
                            <button id="today-prev" aria-label="Anterior">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M15 6 9 12l6 6" />
                                </svg>
                            </button>

                            <button id="today-next" aria-label="Siguiente">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M9 6l6 6-6 6" />
                                </svg>
                            </button>
                        </span>
                    </div>

                    <div class="matches-list" id="today-list">
                        <div class="loading-text">
                            Cargando...
                        </div>
                    </div>
                </div>

                <div class="sports-card">
                    <div class="sports-card-title">Goleadores 2026</div>

                    <div class="scorers-list" id="goles-list">
                        <div class="loading-text">
                            Cargando...
                        </div>
                    </div>
                </div>

                <div class="sports-card" id="bracket-panel">
                    <div class="sports-card-title">
                        Todos los Partidos
                    </div>

                    <div class="bracket-container" id="bracket-wrap">
                        <div class="loading-text">
                            Cargando...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <link href='https://wsrv.nl' rel='preconnect' />
    <script src='https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
    <script defer='defer' src='https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js'></script>
    <script src="/assets/js/instaSports/header.js"></script>
    <script src="/assets/js/instaSports/jquery.js"></script>
</body>

</html>

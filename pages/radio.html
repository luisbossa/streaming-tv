<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio App</title>
    <link rel="stylesheet" href="/assets/css/radio.css">
</head>

<body>
    <div class="radio-container">
        <div class="radio-navbar">
            <div class="header-content">
                <span class="title">RADIO</span>
                <div class="logo-box">
                    <img src="/assets/images/radio-logo.png" alt="">
                </div>
                <span class="title">
                    APP
                </span>
            </div>
        </div>

        <header class="mobile-header">
            <div class="logo">RADIO PLATFORM</div>
            <button id="menu-btn">
                <!-- MENU SVG -->
                <svg viewBox="0 0 24 24" width="22">
                    <path fill="white" d="M3 6h18M3 12h18M3 18h18" />
                </svg>
            </button>
        </header>

        <div class="layout">
            <aside id="sidebar" class="sidebar">
                <div id="shows" class="shows-list"></div>
            </aside>

            <main class="main">

                <div class="hero">
                    <img src="https://picsum.photos/1200/600" class="hero-img">

                    <div class="hero-content">
                        <h1>Ride On</h1>
                        <p class="radio-desc">
                            Extrovertida, amena y auténtica. Noticias, música y humor para tu tarde.
                        </p>
                    </div>
                </div>

                <div class="panel">
                    <div class="player">

                        <div>
                            <strong>Radio</strong>
                            <span id="status">Pausado</span>
                        </div>

                        <div class="controls">
                            <!-- PREV -->
                            <button id="prev">
                                <svg viewBox="0 0 24 24" width="22">
                                    <path fill="white" d="M6 6h2v12H6zm3.5 6L18 18V6z" />
                                </svg>
                            </button>

                            <!-- PLAY -->
                            <button id="play">
                                <svg viewBox="0 0 24 24" width="26">
                                    <path fill="white" d="M8 5v14l11-7z" />
                                </svg>
                            </button>

                            <!-- NEXT -->
                            <button id="next">
                                <svg viewBox="0 0 24 24" width="22">
                                    <path fill="white" d="M16 6h2v12h-2zM6 18l8.5-6L6 6z" />
                                </svg>
                            </button>
                        </div>

                        <div class="volume">
                            <!-- VOLUME -->
                            <svg viewBox="0 0 24 24" width="18">
                                <path fill="white" d="M3 10v4h4l5 5V5l-5 5H3z" />
                            </svg>

                            <input type="range" id="volume" min="0" max="1" step="0.1">
                        </div>

                    </div>
                </div>

            </main>

            <aside class="episodes">
                <h3>Episodios</h3>
                <div id="episodes"></div>
            </aside>

        </div>

        <footer class="footer">
            <div class="footer-left">
                <span class="footer-brand">RADIO APP</span>
                <small>© 2026</small>
            </div>

            <div class="footer-center">
                <a href="#">Inicio</a>
                <a href="#">Explorar</a>
                <a href="#">Favoritos</a>
            </div>

            <div class="footer-right"></div>
        </footer>

        <audio id="audio" src="https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one"></audio>

    </div>

    <script src="/assets/js/radio.js"></script>
</body>

</html>
